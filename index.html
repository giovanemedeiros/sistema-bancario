<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Bancário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/icons/icon-favicon.svg">
</head>
<body>
    <header>
        <h1>Sistema Bancário</h1>
    </header>
    <main>
        <!-------------------- Main page content -------------------->
        <section>
            <div class="button-group">
                <button id="btn-open-transfer">Nova Transferência</button>
                <button id="btn-create-user">Criar Usuários</button>
                <button id="btn-remove-users">Remover Usuários</button>
            </div>
            <div class="main-field">
                <h2 id="title-accounts">Contas cadastradas</h2>
                <div class="download-menu">
                    <div class="download-options hidden">
                        <img src="assets/icons/icon-csv.svg" alt="CSV" title="Exportar para CSV">
                        <img src="assets/icons/icon-excel.svg" alt="Excel" title="Exportar para Excel">
                        <img src="assets/icons/icon-pdf.svg" alt="PDF" title="Exportar para PDF">
                    </div>
                    <img src="assets/icons/icon-download.svg" alt="Download" class="icon-download" id="btn-toggle-download" title="Exportar tabela">
                </div>
            </div>
            <div class="filter-container">
                <input type="text" id="filter-main-table" class="filter-input" placeholder="Filtrar por nome ou conta..." aria-label="Filtrar contas por nome ou número">
                <button type="button" id="btn-main-search" class="btn-table-action">
                    <img src="assets/icons/icon-search.svg" alt="Buscar">
                    Buscar
                </button>
                <button type="button" id="btn-clear-main-filter" class="btn-table-action">
                    <img src="assets/icons/icon-close.svg" alt="Limpar">
                    Limpar
                </button>
            </div>
            <div class="main-table-wrapper">
                <table id="accounts-table">
                    <thead>
                        <tr>
                            <th>Conta</th>
                            <th>Nome</th>
                            <th>Saldo</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>
        <!-------------------- Modal: create user -------------------->
        <div id="modal-create-user" class="modal">
            <div class="modal-content">
                <button class="close-btn" id="close-create-modal">&times;</button>
                <h2>Criar Usuários</h2>
                <div id="create-message" class="message hidden"></div>    
                <form id="create-user-form">
                    <label for="new-user-name">Nome:</label>
                    <input type="text" id="new-user-name" maxlength="35" placeholder="Digite o nome" required>

                    <label for="new-user-account">Número da Conta:</label>
                    <input type="text" id="new-user-account" maxlength="9" placeholder="Ex: 123456789" pattern="[0-9]+" inputmode="numeric" required>

                    <label for="new-user-balance">Saldo Inicial:</label>
                    <input type="text" id="new-user-balance" placeholder="R$ 0,00" inputmode="decimal" required>

                    <button type="submit">Criar Usuário</button>
                </form>
            </div>
        </div>
        <!-------------------- Modal: edit user -------------------->
        <div id="modal-edit-user" class="modal">
            <div class="modal-content">
                <button class="close-btn" id="close-edit-modal">&times;</button>   
                <h2>Editar Nome</h2>
                <div id="edit-message" class="message hidden"></div> 
                <form id="edit-user-form">
                    <label>Nome:</label>
                    <input type="text" id="edit-user-name" maxlength="35" placeholder="Digite o novo nome" required>
                    <button type="submit" class="btn-table-action">Salvar</button>
                </form>
            </div>
        </div>
        <!-------------------- Modal: remove users -------------------->
        <div id="modal-remove-users" class="modal">
            <div class="modal-content modal-content-large">
                <button class="close-btn" id="close-remove-modal">&times;</button>
                <h2>Remover Usuários</h2>
                <div id="remove-user-message" class="message hidden"></div>  
                <div class="filter-container">
                    <input type="text" id="filter-users" class="filter-input" placeholder="Filtrar por nome ou conta..." aria-label="Filtrar usuários por nome ou número">
                    <button type="button" id="btn-confirm-search" class="btn-table-action">
                        <img src="assets/icons/icon-search.svg" alt="Buscar">
                        Buscar
                    </button>
                    <button type="button" id="btn-clear-modal-filter" class="btn-table-action">
                        <img src="assets/icons/icon-close.svg" alt="Limpar">
                        Limpar
                    </button>
                </div>
                <div class="table-wrapper">
                    <table id="remove-users-table">
                        <thead>
                            <tr>
                                <th>
                                    <input type="checkbox" id="select-all" aria-label="Selecionar todos os usuários">
                                </th>
                                <th>Conta</th>
                                <th>Nome</th>
                                <th>Saldo</th>
                            </tr>
                        </thead>
                        <tbody id="remove-table-body"></tbody>
                    </table>
                </div>
                <button type="button" id="btn-confirm-remove" class="btn-danger">Excluir Selecionados</button>
            </div>
        </div>
        <!-------------------- Modal: new transfer -------------------->
        <div id="modal-transfer" class="modal">
            <div class="modal-content">
                <button class="close-btn" id="close-transfer-modal">&times;</button>
                <h2>Nova Transferência</h2>
                <div id="transfer-message" class="message hidden"></div>
                <form id="transfer-form">
                    <label for="from-account">Conta de Origem:</label>
                    <div class="originBalance">
                        <div class="custom-select" id="from-account-wrapper">
                            <div class="custom-select-trigger" id="from-account">
                                <span>Selecione uma conta</span>
                                <div class="arrow">▼</div>
                            </div>
                            <div class="custom-options" id="from-account-options"></div>
                        </div>
                        <span class="span-balance">Saldo:</span>
                        <span id="origin-balance">R$0,00</span>
                    </div>
                    <label for="to-account">Conta de Destino:</label>
                    <div class="destinationBalance">
                        <div class="custom-select" id="to-account-wrapper">
                            <div class="custom-select-trigger" id="to-account">
                                <span>Selecione uma conta</span>
                                <div class="arrow">▼</div>
                            </div>
                            <div class="custom-options" id="to-account-options"></div>
                        </div>
                        <span class="span-balance">Saldo:</span>
                        <span id="destination-balance">R$0,00</span>
                    </div>
                    <label for="new-transfer-amount">Valor da Transferência:</label>
                    <input type="text" id="new-transfer-amount" placeholder="R$ 0,00" inputmode="decimal" required>
                    <button type="submit">Transferir</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <p>© 2026 Sistema Bancário. Todos os direitos reservados.</p>
    </footer>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script> <!-- Library for Excel export (XLSX) - version 0.20.1 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> <!-- Library for PDF export (jsPDF) - version 2.5.1 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script> <!-- jsPDF AutoTable plugin for generating tables in PDF - version 3.5.31 -->
    <script src="script.js"></script>
</body>
</html>
